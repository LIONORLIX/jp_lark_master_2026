name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Install
        run: npm ci

      - name: Create .env from GitHub Secrets
        env:
          REIMAGINE: ${{ secrets.REIMAGINE || vars.REIMAGINE }}
          LARK_APP_ID: ${{ secrets.LARK_APP_ID || vars.LARK_APP_ID }}
          LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET || vars.LARK_APP_SECRET }}
          BITABLE_APP_TOKEN: ${{ secrets.BITABLE_APP_TOKEN || vars.BITABLE_APP_TOKEN }}
          BITABLE_PHOTO_FIELD: ${{ secrets.BITABLE_PHOTO_FIELD || vars.BITABLE_PHOTO_FIELD }}
          BITABLE_TABLE_ID: ${{ secrets.BITABLE_TABLE_ID || vars.BITABLE_TABLE_ID }}
          BITABLE_TABLES: ${{ secrets.BITABLE_TABLES || vars.BITABLE_TABLES }}
          BITABLE_CATEGORY_FIELD: ${{ secrets.BITABLE_CATEGORY_FIELD || vars.BITABLE_CATEGORY_FIELD }}
          CATEGORIES: ${{ secrets.CATEGORIES || vars.CATEGORIES }}
          SITE_TITLE: ${{ secrets.SITE_TITLE || vars.SITE_TITLE }}
          LARK_HTTP_TIMEOUT_MS: ${{ secrets.LARK_HTTP_TIMEOUT_MS || vars.LARK_HTTP_TIMEOUT_MS }}
        run: |
          set_env() {
            key="$1"
            value="$2"
            if [ -n "$value" ]; then
              grep -v "^${key}=" .env > .env.tmp || true
              mv .env.tmp .env
              printf "%s=%s\n" "$key" "$value" >> .env
            fi
          }

          default_env() {
            key="$1"
            value="$2"
            if ! grep -q "^${key}=" .env; then
              printf "%s=%s\n" "$key" "$value" >> .env
            fi
          }

          if [ -n "$REIMAGINE" ]; then
            # Backward compatible: one repository secret named REIMAGINE with lines like KEY=value.
            printf "%s" "$REIMAGINE" > .env
          else
            : > .env
          fi

          # Preferred: repository/environment secrets named the same as the runtime env vars.
          # These override values from REIMAGINE when both are configured.
          set_env "LARK_APP_ID" "$LARK_APP_ID"
          set_env "LARK_APP_SECRET" "$LARK_APP_SECRET"
          set_env "BITABLE_APP_TOKEN" "$BITABLE_APP_TOKEN"
          set_env "BITABLE_PHOTO_FIELD" "$BITABLE_PHOTO_FIELD"
          set_env "BITABLE_TABLE_ID" "$BITABLE_TABLE_ID"
          set_env "BITABLE_TABLES" "$BITABLE_TABLES"
          set_env "BITABLE_CATEGORY_FIELD" "$BITABLE_CATEGORY_FIELD"
          set_env "CATEGORIES" "$CATEGORIES"
          set_env "SITE_TITLE" "$SITE_TITLE"
          set_env "LARK_HTTP_TIMEOUT_MS" "$LARK_HTTP_TIMEOUT_MS"
          default_env "CATEGORIES" "Foyer,Main session,Room 1 - Ops track,Room 2 - Tech track"
          default_env "SITE_TITLE" "Reimagine 2026 Photo"
          default_env "LARK_HTTP_TIMEOUT_MS" "60000"

          missing=0
          for key in LARK_APP_ID LARK_APP_SECRET BITABLE_APP_TOKEN BITABLE_PHOTO_FIELD; do
            if ! grep -q "^${key}=.\+" .env; then
              echo "Missing env: ${key}"
              missing=1
            fi
          done
          if ! grep -q "^BITABLE_TABLE_ID=.\+" .env && ! grep -q "^BITABLE_TABLES=.\+" .env; then
            echo "Missing env: BITABLE_TABLE_ID (or BITABLE_TABLES)"
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Fetch from Lark Base
        run: npm run fetch

      - name: Build static site
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
